name: Sync Project Tables

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/update-readme-projects.js
      - .github/workflows/update-projects.yml

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate project tables
        env:
          GH_TOKEN: ${{ secrets.PROFILE_README_TOKEN != '' && secrets.PROFILE_README_TOKEN || github.token }}
          GITHUB_OWNER: YosefHayim
          README_REPO: YosefHayim
          INCLUDE_PRIVATE_DETAILS: "true"
          MAX_PUBLIC_REPOS: "12"
          MAX_PRIVATE_REPOS: "12"
        run: node scripts/update-readme-projects.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: sync project tables [skip ci]" &&
            git push
          )
